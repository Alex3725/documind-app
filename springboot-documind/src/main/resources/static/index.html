<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documind Server Status</title>
    <!-- Font terminale -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* Reset e font */
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Share Tech Mono', monospace; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(160deg, #e0e0e0, #f9f9f9);
            color: #333;
            overflow: hidden;
        }

        .card {
            position: relative;
            background: #ffffffcc;
            padding: 50px 70px;
            border-radius: 20px;
            text-align: center;
            max-width: 700px;
            width: 90%;
            backdrop-filter: blur(5px);
            border: 1px solid #ccc;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #444;
        }

        .status {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            gap: 12px;
        }

        .status-indicator {
            width: 18px;
            height: 18px;
            background: #6abf69; /* verde chiaro */
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.7; }
        }

        p.description {
            font-size: 1.25rem;
            margin-bottom: 25px;
            color: #555;
        }

        .server-info {
            text-align: left;
            background: #f0f0f0;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 1rem;
            color: #333;
        }

        .server-info div {
            margin: 6px 0;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #6abf69;
            color: #fff;
            font-weight: 600;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: #5aa35a;
        }

    </style>
</head>
<body>
<div class="card">
    <div class="status">
        <div class="status-indicator"></div>
        <span>SERVER ONLINE</span>
    </div>
    <h1>DOCUMIND APP</h1>
    <p class="description">Your Spring Boot server is active and ready to recive requests.</p>

    <div class="server-info">
        <div><strong>hostname:</strong> localhost</div>
        <div><strong>porta_web:</strong> 8080</div>
        <div><strong>porta_database:</strong> 3306</div>
        <div><strong>spring_boot:</strong> 4.0.2</div>
        <div><strong>database:</strong> mariadb (documind_app, admin123)</div>
        <div><strong>database_state:</strong> connected</div>
    </div>

    <a href="/" class="btn">Aggiorna</a>
</div>
</body>
</html>
